name: Deploy manual site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # lastUpdated 表示のため履歴を取得

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      # ---------- パスワードゲート（staticrypt で HTML を暗号化）----------
      - name: Encrypt built site with staticrypt
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          if [ -z "$SITE_PASSWORD" ]; then
            echo "::warning::SITE_PASSWORD secret is not set. Site will be published WITHOUT password protection."
            exit 0
          fi
          npx --yes staticrypt \
            --directory docs/.vitepress/dist \
            -d docs/.vitepress/dist \
            --short \
            -p "$SITE_PASSWORD" \
            --template-title "CyTech IR 運用マニュアル" \
            --template-instructions "閲覧にはパスワードが必要です。GL より配布されたパスワードを入力してください。" \
            --template-button "閲覧する" \
            --template-color-primary "#2383E2" \
            --template-color-secondary "#fbfbfa" \
            --remember 7

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
